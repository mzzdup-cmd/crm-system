name: CRM → TT Sheets Sync

on:
  schedule:
    # 3 slots MSK (UTC+3)
    # 00:00 MSK = 21:00 UTC (prev calendar day in UTC)
    - cron: "0 21 * * *"
    # 10:00 MSK = 07:00 UTC
    - cron: "0 7 * * *"
    # 16:00 MSK = 13:00 UTC
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install functions dependencies
        working-directory: functions
        run: npm install

      - name: Run TT append sync
        working-directory: functions
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          TT_SHEET_TAB: TT
          MANAGER_TT_SPREADSHEETS_JSON: ${{ secrets.MANAGER_TT_SPREADSHEETS_JSON }}
        run: npm run tt-sync
