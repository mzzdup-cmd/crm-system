name: CRM → TT Sheets Sync

on:
  schedule:
    # Every 4 hours MSK (UTC+3)
    # 01:00 MSK = 22:00 UTC (previous day)
    - cron: "0 22 * * *"
    # 05:00 MSK = 02:00 UTC
    - cron: "0 2 * * *"
    # 09:00 MSK = 06:00 UTC
    - cron: "0 6 * * *"
    # 13:00 MSK = 10:00 UTC
    - cron: "0 10 * * *"
    # 17:00 MSK = 14:00 UTC
    - cron: "0 14 * * *"
    # 21:00 MSK = 18:00 UTC
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install functions dependencies
        working-directory: functions
        run: npm install

      - name: Run TT append sync
        working-directory: functions
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          TT_SHEET_TAB: TT
          MANAGER_TT_SPREADSHEETS_JSON: ${{ secrets.MANAGER_TT_SPREADSHEETS_JSON }}
        run: npm run tt-sync
