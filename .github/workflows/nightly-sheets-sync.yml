name: CRM → TT Sheets Sync

on:
  schedule:
    # 6 slots MSK (UTC+3)
    # 03:00 MSK = 00:00 UTC
    - cron: "0 0 * * *"
    # 10:00 MSK = 07:00 UTC
    - cron: "0 7 * * *"
    # 13:00 MSK = 10:00 UTC
    - cron: "0 10 * * *"
    # 17:00 MSK = 14:00 UTC
    - cron: "0 14 * * *"
    # 20:00 MSK = 17:00 UTC
    - cron: "0 17 * * *"
    # 23:00 MSK = 20:00 UTC
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install functions dependencies
        working-directory: functions
        run: npm install

      - name: Run TT append sync
        working-directory: functions
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          TT_SHEET_TAB: TT
          MANAGER_TT_SPREADSHEETS_JSON: ${{ secrets.MANAGER_TT_SPREADSHEETS_JSON }}
        run: npm run tt-sync
